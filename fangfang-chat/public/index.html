<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方方·专属字卡信箱</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --white: #ffffff;
            --gold-light: #f5e9c8;
            --gold: #d4b87a;
            --gold-dark: #b89b5e;
            --text: #333333;
            --shadow: 0 2px 12px rgba(212, 184, 122, 0.25);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", serif; }
        body { background: var(--white); color: var(--text); padding: 15px; background-image: radial-gradient(#f5e9c8 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr 300px; gap: 15px; height: 95vh; }
        .left-panel { background: var(--white); border: 1px solid var(--gold); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); }
        .logo { text-align: center; font-size: 20px; color: var(--gold-dark); font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        .nav-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: linear-gradient(135deg, #fff, var(--gold-light)); border: 1px solid var(--gold); border-radius: 12px; cursor: pointer; font-size: 15px; transition: 0.3s; }
        .nav-btn:hover { background: var(--gold); color: #fff; }
        .chat-main { background: var(--white); border: 1px solid var(--gold); border-radius: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
        .chat-title { padding: 15px; text-align: center; border-bottom: 1px solid var(--gold-light); font-size: 18px; color: var(--gold-dark); }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; }
        .msg-item { margin: 10px 0; max-width: 75%; }
        .my-msg { margin-left: auto; }
        .other-msg { margin-right: auto; }
        .msg-content { padding: 10px 14px; border-radius: 14px; line-height: 1.6; }
        .my-msg .msg-content { background: #fff; border: 1px solid var(--gold); }
        .other-msg .msg-content { background: linear-gradient(135deg, var(--gold-light), #fff); border: 1px solid var(--gold); }
        .input-area { display: flex; gap: 10px; padding: 15px; border-top: 1px solid var(--gold-light); flex-wrap: wrap; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid var(--gold); border-radius: 12px; outline: none; min-width: 150px; }
        .send-btn, .random-card-btn, .voice-btn, .setting-btn { padding: 12px 18px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
        .voice-btn { background: linear-gradient(135deg, #e06c75, #be5058); }
        .setting-btn { background: linear-gradient(135deg, #718096, #4a5568); }
        .right-panel { display: flex; flex-direction: column; gap: 15px; }
        .card-box, .emo-box, .letter-box, .remark-box, .setting-box { background: var(--white); border: 1px solid var(--gold); border-radius: 16px; padding: 15px; box-shadow: var(--shadow); }
        .title { font-size: 16px; color: var(--gold-dark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--gold-light); }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid var(--gold); border-radius: 10px; resize: none; outline: none; }
        .btn-sm { margin-top: 10px; padding: 8px 12px; background: var(--gold-light); border: 1px solid var(--gold); border-radius: 8px; cursor: pointer; }
        .popup-notice { position: fixed; top: 20px; right: 20px; padding: 15px 20px; background: linear-gradient(135deg, #fff, var(--gold-light)); border: 1px solid var(--gold-dark); border-radius: 12px; box-shadow: var(--shadow); display: none; z-index: 999; }
        .emo-img { width: 50px; height: 50px; margin: 5px; border-radius: 8px; cursor: pointer; }
        .setting-item { margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .setting-item input { width: 100px; padding: 6px; border: 1px solid var(--gold); border-radius: 6px; text-align: center; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="logo">方方 · 字卡小筑</div>
            <button class="nav-btn" onclick="switchTab('chat')">聊天界面</button>
            <button class="nav-btn" onclick="switchTab('card')">字卡管理</button>
            <button class="nav-btn" onclick="switchTab('emo')">表情包</button>
            <button class="nav-btn" onclick="switchTab('remark')">双向备注</button>
            <button class="nav-btn" onclick="switchTab('letter')">写信收信</button>
            <button class="nav-btn" onclick="switchTab('setting')">自动回复设置</button>
        </div>

        <div class="chat-main">
            <div class="chat-title" id="chatTitle">和方方的专属对话（公网在线）</div>
            <div class="chat-box" id="chatBox"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="输入想说的话...">
                <button class="random-card-btn" onclick="sendRandomCard()">随机字卡</button>
                <button class="send-btn" onclick="sendMsg()">发送</button>
                <button class="voice-btn" id="voiceBtn">🎤 按住说话</button>
                <button class="setting-btn" onclick="autoReply()">🤖 自动回复</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="card-box" id="cardPanel">
                <div class="title">字卡管理</div>
                <textarea id="cardText" placeholder="每行一条字卡，设置回复词库"></textarea>
                <button class="btn-sm" onclick="saveCard()">保存字卡</button>
            </div>
            <div class="emo-box" id="emoPanel" style="display:none;">
                <div class="title">上传共用表情包</div>
                <input type="file" id="emoUpload" accept="image/*">
                <button class="btn-sm" onclick="uploadEmoji()">确认上传</button>
                <div id="emoList"></div>
            </div>
            <div class="remark-box" id="remarkPanel" style="display:none;">
                <div class="title">给对方备注</div>
                <input type="text" id="remarkInput" placeholder="输入备注" style="width:100%;padding:8px;border:1px solid #d4b87a;border-radius:8px;">
                <button class="btn-sm" onclick="saveRemark()" style="margin-top:10px;">保存备注</button>
            </div>
            <div class="letter-box" id="letterPanel" style="display:none;">
                <div class="title">写信</div>
                <textarea id="letterText" placeholder="写下信件内容"></textarea>
                <button class="btn-sm" onclick="sendLetter()">寄出信件</button>
            </div>
            <div class="setting-box" id="settingPanel" style="display:none;">
                <div class="title">自动回复设置</div>
                <div class="setting-item">
                    <span>回复次数</span>
                    <input type="number" id="replyCount" value="5" min="1" max="20">
                </div>
                <div class="setting-item">
                    <span>最快回复(秒)</span>
                    <input type="number" id="minDelay" value="3" min="1" max="300">
                </div>
                <div class="setting-item">
                    <span>最慢回复(秒)</span>
                    <input type="number" id="maxDelay" value="30" min="1" max="300">
                </div>
                <div class="two-col">
                    <button class="btn-sm" onclick="saveAutoConfig()">保存设置</button>
                    <button class="btn-sm" onclick="exportData()">导出数据</button>
                    <button class="btn-sm" onclick="document.getElementById('importData').click()">导入数据</button>
                    <input type="file" id="importData" accept=".json" style="display:none;" onchange="importData(event)">
                </div>
            </div>
        </div>
    </div>

    <div class="popup-notice" id="popupNotice">
        方方发来消息啦💛
    </div>

    <script>
        const socket=io();
        let cardList=JSON.parse(localStorage.getItem('cardList')) || ["我一直在你身边","乖乖，别难过","有我陪着你"];
        let emoList=JSON.parse(localStorage.getItem('emoList')) || [];
        let recognition;
        let isRecognizing=false;
        const uid=Math.random().toString(36).substr(2,9);
        let autoConfig = { replyCount:5, minDelay:3, maxDelay:30 };

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition=new SpeechRecognition();
            recognition.continuous=false;
            recognition.interimResults=false;
            recognition.lang='zh-CN';

            recognition.onresult=(e) => {
                const text=e.results[0][0].transcript.trim();
                if (text) socket.emit('voiceToText', text);
            };
            recognition.onend=() => { isRecognizing=false; updateVoiceBtn(); };
            recognition.onerror=(err) => { isRecognizing=false; updateVoiceBtn(); };
        }

        const voiceBtn=document.getElementById('voiceBtn');
        voiceBtn.addEventListener('mousedown', () => {
            if (!recognition || isRecognizing) return;
            isRecognizing=true;
            recognition.start();
            updateVoiceBtn();
        });
        voiceBtn.addEventListener('mouseup', () => {
            if (recognition && isRecognizing) recognition.stop();
        });
        function updateVoiceBtn() {
            voiceBtn.innerText=isRecognizing ? '🎙️ 识别中...' : '🎤 按住说话';
        }

        socket.on('history', (list) => {
            list.forEach(item => addChatItem(item.text, item.type, false));
        });
        socket.on('msg', (data) => {
            addChatItem(data.text, data.type, true);
        });
        socket.on('remarkUpdate', (data) => {
            const remark=data[uid] || '方方';
            document.getElementById('chatTitle').innerText=`和${remark}的专属对话（公网在线）`;
        });
        socket.on('autoConfig', (config) => {
            autoConfig = config;
            document.getElementById('replyCount').value = config.replyCount;
            document.getElementById('minDelay').value = config.minDelay;
            document.getElementById('maxDelay').value = config.maxDelay;
        });

        function switchTab(tab){
            document.querySelectorAll('.right-panel > div').forEach(el=>el.style.display='none');
            if(tab==='card') document.getElementById('cardPanel').style.display='block';
            if(tab==='emo') document.getElementById('emoPanel').style.display='block';
            if(tab==='remark') document.getElementById('remarkPanel').style.display='block';
            if(tab==='letter') document.getElementById('letterPanel').style.display='block';
            if(tab==='setting') document.getElementById('settingPanel').style.display='block';
        }

        function sendMsg(){
            const val=document.getElementById('msgInput').value.trim();
            if(!val) return;
            const data={ text: val, type: 'me', time: new Date().toLocaleString() };
            socket.emit('msg', data);
            document.getElementById('msgInput').value='';
        }

        function addChatItem(text, type, showPop=true){
            const box=document.getElementById('chatBox');
            const div=document.createElement('div');
            div.className=type==='me' ? 'msg-item my-msg' : 'msg-item other-msg';
            if(text.startsWith('data:image')){
                div.innerHTML=`<img src="${text}" class="emo-img">`;
            }else{
                div.innerHTML=`<div class="msg-content">${text}</div>`;
            }
            box.appendChild(div);
            box.scrollTop=box.scrollHeight;
            if (type==='other' && showPop) showPopup();
        }

        function sendRandomCard(){
            if(cardList.length===0){ alert("先添加字卡"); return; }
            const random=cardList[Math.floor(Math.random()*cardList.length)];
            const data={ text: random, type: 'other', time: new Date().toLocaleString() };
            socket.emit('msg', data);
        }

        function saveCard(){
            const text=document.getElementById('cardText').value;
            const arr=text.split('\n').filter(item=>item.trim());
            cardList=arr;
            localStorage.setItem('cardList',JSON.stringify(cardList));
            alert("字卡已保存");
        }

        function saveRemark(){
            const name=document.getElementById('remarkInput').value.trim();
            if(!name) return;
            socket.emit('setRemark', { uid, remark: name });
            alert("备注已保存");
        }

        function sendLetter(){
            const letter=document.getElementById('letterText').value.trim();
            if(!letter) return;
            const data={ text: `📩 一封信：${letter}`, type: 'me', time: new Date().toLocaleString() };
            socket.emit('msg', data);
            document.getElementById('letterText').value='';
        }

        function uploadEmoji(){
            const file=document.getElementById('emoUpload').files[0];
            if(!file) return;
            const reader=new FileReader();
            reader.onload=function(e){
                const base64=e.target.result;
                emoList.push(base64);
                localStorage.setItem('emoList',JSON.stringify(emoList));
                const data={ text: base64, type: 'me', time: new Date().toLocaleString() };
                socket.emit('msg', data);
                renderEmoji();
            };
            reader.readAsDataURL(file);
        }

        function renderEmoji(){
            const list=document.getElementById('emoList');
            list.innerHTML='';
            emoList.forEach(src=>{
                const img=document.createElement('img');
                img.src=src;
                img.className='emo-img';
                img.onclick=()=>{
                    const data={ text: src, type: 'me', time: new Date().toLocaleString() };
                    socket.emit('msg', data);
                };
                list.appendChild(img);
            });
        }

        function showPopup(){
            const pop=document.getElementById('popupNotice');
            pop.style.display='block';
            setTimeout(()=>pop.style.display='none',2500);
        }

        function saveAutoConfig(){
            const replyCount = parseInt(document.getElementById('replyCount').value);
            const minDelay = parseInt(document.getElementById('minDelay').value);
            const maxDelay = parseInt(document.getElementById('maxDelay').value);
            if(minDelay>maxDelay){ alert("最快回复不能比最慢回复大"); return; }
            autoConfig = { replyCount, minDelay, maxDelay };
            socket.emit('setAutoConfig', autoConfig);
            alert("自动回复设置已保存");
        }

        function autoReply(){
            if(cardList.length===0){ alert("先添加字卡再开启自动回复"); return; }
            let count = 0;
            const sendReply = () => {
                if(count >= autoConfig.replyCount) return;
                const delay = Math.random()*(autoConfig.maxDelay - autoConfig.minDelay) + autoConfig.minDelay;
                setTimeout(() => {
                    const random=cardList[Math.floor(Math.random()*cardList.length)];
                    const data={ text: random, type: 'other', time: new Date().toLocaleString() };
                    socket.emit('msg', data);
                    count++;
                    sendReply();
                }, delay*1000);
            };
            sendReply();
        }

        function exportData(){
            const data = { cardList, emoList, autoConfig };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'fangfang-data.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event){
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e){
                const data = JSON.parse(e.target.result);
                if(data.cardList) { cardList = data.cardList; localStorage.setItem('cardList',JSON.stringify(cardList)); document.getElementById('cardText').value = cardList.join('\n'); }
                if(data.emoList) { emoList = data.emoList; localStorage.setItem('emoList',JSON.stringify(emoList)); renderEmoji(); }
                if(data.autoConfig) { autoConfig = data.autoConfig; socket.emit('setAutoConfig', autoConfig); }
                alert("数据导入成功");
            };
            reader.readAsText(file);
        }

        window.onload=function(){
            document.getElementById('cardText').value=cardList.join('\n');
            renderEmoji();
        };
    </script>
